<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Degrande Bullet Threading v0.1.1</title>
    <meta name="degrande-bullet-threading-version" content="0.1.1">
    <style>
      :root {
        --dgbt-panel-bg: rgba(248, 250, 255, 0.94);
        --dgbt-panel-bg-strong: rgba(255, 255, 255, 0.9);
        --dgbt-panel-border: rgba(148, 163, 184, 0.24);
        --dgbt-panel-text: #132033;
        --dgbt-panel-muted: #5d6c82;
        --dgbt-panel-accent: #1f7ae0;
        --dgbt-panel-shadow: 0 30px 80px rgba(15, 23, 42, 0.18);
        --dgbt-panel-thread-width: 2px;
        --dgbt-panel-motion-duration: 700ms;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        font-family: Aptos, "Segoe UI Variable Text", "Segoe UI", sans-serif;
        background: transparent;
        color: var(--dgbt-panel-text);
      }

      body {
        overflow: hidden;
      }

      #app {
        min-height: 100vh;
      }

      .dgbt-panel-shell {
        position: relative;
        width: 100vw;
        height: 100vh;
        display: grid;
        place-items: center;
        padding: 14px;
        box-sizing: border-box;
      }

      .dgbt-panel-backdrop {
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at top right, rgba(31, 122, 224, 0.12), transparent 30%),
          linear-gradient(180deg, rgba(15, 23, 42, 0.16), rgba(15, 23, 42, 0.08));
      }

      .dgbt-panel-window {
        position: relative;
        z-index: 1;
        width: min(700px, calc(100vw - 28px));
        max-height: calc(100vh - 28px);
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        overflow: hidden;
        border: 1px solid var(--dgbt-panel-border);
        border-radius: 24px;
        background:
          radial-gradient(circle at top left, rgba(31, 122, 224, 0.1), transparent 28%),
          var(--dgbt-panel-bg);
        box-shadow: var(--dgbt-panel-shadow);
        -webkit-backdrop-filter: blur(18px) saturate(130%);
        backdrop-filter: blur(18px) saturate(130%);
      }

      .dgbt-panel-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 12px;
        padding: 16px 18px 12px;
        border-bottom: 1px solid var(--dgbt-panel-border);
      }

      .dgbt-panel-title-row {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .dgbt-panel-eyebrow,
      .dgbt-panel-card-eyebrow,
      .dgbt-accent-palette-label {
        margin: 0;
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--dgbt-panel-accent);
      }

      .dgbt-panel-header h1 {
        margin: 0;
        font-size: clamp(24px, 4vw, 34px);
        line-height: 0.98;
        letter-spacing: -0.05em;
      }

      .dgbt-panel-version,
      .dgbt-panel-pill {
        display: inline-flex;
        align-items: center;
        min-height: 26px;
        padding: 0 10px;
        border-radius: 999px;
        font-size: 10px;
        font-weight: 700;
      }

      .dgbt-panel-version {
        background: rgba(31, 122, 224, 0.12);
        color: var(--dgbt-panel-accent);
      }

      .dgbt-panel-subtitle {
        margin: 6px 0 0;
        max-width: 480px;
        font-size: 12px;
        line-height: 1.4;
        color: var(--dgbt-panel-muted);
      }

      .dgbt-panel-button,
      .dgbt-choice-button,
      .dgbt-choice-pill span,
      .dgbt-text-input,
      .dgbt-color-input {
        font: inherit;
      }

      .dgbt-panel-button {
        appearance: none;
        border: 1px solid var(--dgbt-panel-border);
        border-radius: 999px;
        min-height: 36px;
        padding: 0 14px;
        background: rgba(255, 255, 255, 0.78);
        color: var(--dgbt-panel-text);
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
      }

      .dgbt-panel-main {
        padding: 12px;
        min-height: 0;
        overflow: auto;
      }

      .dgbt-panel-controls-column {
        display: grid;
        min-height: 0;
      }

      .dgbt-panel-card {
        border: 1px solid var(--dgbt-panel-border);
        border-radius: 18px;
        background: var(--dgbt-panel-bg-strong);
        box-shadow: 0 14px 30px rgba(15, 23, 42, 0.06);
        padding: 14px;
      }

      .dgbt-panel-card-head {
        display: grid;
        gap: 4px;
        margin-bottom: 10px;
      }

      .dgbt-panel-card-head h2 {
        margin: 0;
        font-size: 18px;
        letter-spacing: -0.03em;
      }

      .dgbt-panel-card-copy {
        margin: 0;
        font-size: 12px;
        line-height: 1.4;
        color: var(--dgbt-panel-muted);
      }

      .dgbt-panel-status-strip {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-bottom: 10px;
      }

      .dgbt-thread-preview {
        position: relative;
        min-height: 54px;
        padding: 10px 14px;
        margin-bottom: 10px;
        border: 1px solid rgba(148, 163, 184, 0.18);
        border-radius: 14px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.72), rgba(245, 248, 255, 0.92));
        overflow: hidden;
      }

      .dgbt-thread-preview-line {
        position: relative;
        height: 24px;
        margin: 5px 0;
      }

      .dgbt-thread-preview-core {
        position: absolute;
        top: 50%;
        left: 0;
        width: calc(100% - 18px);
        transform: translateY(-50%);
        border-radius: 0;
        z-index: 1;
      }

      .dgbt-thread-preview-core {
        height: calc(var(--dgbt-panel-thread-width) + 1px);
        background: color-mix(in srgb, var(--dgbt-panel-accent) 88%, white 12%);
      }

      .dgbt-thread-preview[data-shape="rounded"] .dgbt-thread-preview-core {
        border-radius: 999px;
      }

      .dgbt-thread-preview[data-shape="square"] .dgbt-thread-preview-core {
        border-radius: 0;
      }

      .dgbt-thread-preview-dot {
        position: absolute;
        top: 50%;
        right: 0;
        width: calc(var(--dgbt-panel-thread-width) + 12px);
        height: calc(var(--dgbt-panel-thread-width) + 12px);
        transform: translateY(-50%);
        border-radius: 999px;
        background: color-mix(in srgb, var(--dgbt-panel-accent) 88%, white 12%);
        box-shadow: none;
        z-index: 2;
      }

      .dgbt-thread-preview[data-motion="still"] .dgbt-thread-preview-core,
      .dgbt-thread-preview[data-motion="still"] .dgbt-thread-preview-dot,
      .dgbt-thread-preview.is-paused .dgbt-thread-preview-core,
      .dgbt-thread-preview.is-paused .dgbt-thread-preview-dot {
        animation: none;
      }

      .dgbt-thread-preview[data-motion="drift"] .dgbt-thread-preview-core {
        background:
          repeating-linear-gradient(90deg, var(--dgbt-panel-accent) 0 14px, color-mix(in srgb, var(--dgbt-panel-accent) 78%, white 22%) 14px 24px);
        animation: dgbt-panel-line-drift 1800ms linear infinite;
      }

      .dgbt-thread-preview[data-motion="drift"] .dgbt-thread-preview-dot {
        animation: dgbt-panel-dot-drift 1800ms ease-in-out infinite;
      }

      .dgbt-thread-preview[data-accent-mode="rainbow"] .dgbt-thread-preview-core {
        background: linear-gradient(90deg, var(--dgbt-rainbow-0) 0%, var(--dgbt-rainbow-1) 18%, var(--dgbt-rainbow-2) 34%, var(--dgbt-rainbow-3) 50%, var(--dgbt-rainbow-5) 68%, var(--dgbt-rainbow-6) 84%, var(--dgbt-rainbow-7) 100%);
        background-size: 220px 100%;
      }

      .dgbt-thread-preview[data-accent-mode="rainbow"] .dgbt-thread-preview-dot {
        background: var(--dgbt-rainbow-7);
      }

      .dgbt-thread-preview[data-accent-mode="rainbow"][data-motion="drift"] .dgbt-thread-preview-core {
        background:
          repeating-linear-gradient(90deg, var(--dgbt-rainbow-0) 0 12px, var(--dgbt-rainbow-1) 12px 24px, var(--dgbt-rainbow-2) 24px 36px, var(--dgbt-rainbow-3) 36px 48px, var(--dgbt-rainbow-5) 48px 60px, var(--dgbt-rainbow-6) 60px 72px, var(--dgbt-rainbow-7) 72px 84px);
        animation: dgbt-panel-line-drift 1800ms linear infinite;
      }

      .dgbt-panel-pill {
        background: rgba(31, 122, 224, 0.12);
        color: var(--dgbt-panel-accent);
      }

      .dgbt-panel-pill-muted {
        background: rgba(148, 163, 184, 0.12);
        color: var(--dgbt-panel-muted);
      }

      .dgbt-switch-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
        gap: 12px;
        padding: 0 0 10px;
      }

      .dgbt-switch-row strong {
        display: block;
        font-size: 15px;
      }

      .dgbt-switch-row p,
      .dgbt-control-help {
        margin: 4px 0 0;
        font-size: 12px;
        line-height: 1.45;
        color: var(--dgbt-panel-muted);
      }

      .dgbt-switch-row input[type="checkbox"] {
        width: 22px;
        height: 22px;
        accent-color: var(--dgbt-panel-accent);
      }

      .dgbt-control-group {
        display: grid;
        gap: 8px;
        padding-top: 10px;
        margin-top: 10px;
        border-top: 1px solid rgba(148, 163, 184, 0.18);
      }

      .dgbt-control-head {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 12px;
      }

      .dgbt-control-head strong {
        font-size: 14px;
      }

      .dgbt-control-head span {
        font-size: 11px;
        color: var(--dgbt-panel-muted);
      }

      .dgbt-control-head-accent {
        justify-content: flex-end;
      }

      .dgbt-accent-palette-group {
        display: grid;
        gap: 6px;
      }

      .dgbt-accent-palette-label {
        color: var(--dgbt-panel-muted);
      }

      .dgbt-accent-swatch-grid {
        display: flex;
        flex-wrap: nowrap;
        gap: 5px;
        overflow-x: auto;
        overflow-y: hidden;
        padding-bottom: 2px;
      }

      .dgbt-accent-swatch-grid-wide {
        display: flex;
        flex-wrap: nowrap;
      }

      .dgbt-accent-swatch-grid::-webkit-scrollbar {
        display: none;
      }

      .dgbt-accent-swatch-button {
        appearance: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 20px;
        height: 20px;
        padding: 0;
        border: 1px solid rgba(148, 163, 184, 0.28);
        border-radius: 7px;
        background: color-mix(in srgb, var(--dgbt-swatch-color) 14%, white 86%);
        box-shadow: inset 0 0 0 1.5px var(--dgbt-swatch-color);
        color: #172033;
        font-size: 10px;
        font-weight: 800;
        cursor: pointer;
        transition: transform 140ms ease, box-shadow 140ms ease, border-color 140ms ease;
      }

      .dgbt-accent-swatch-button:hover {
        transform: translateY(-1px);
      }

      .dgbt-accent-swatch-button.is-active {
        border-color: var(--dgbt-swatch-color);
        box-shadow:
          inset 0 0 0 1.5px var(--dgbt-swatch-color),
          0 0 0 3px rgba(15, 23, 42, 0.08);
      }

      .dgbt-accent-swatch-button.is-special {
        font-size: 11px;
      }

      .dgbt-accent-swatch-button.is-rainbow {
        border-color: rgba(255, 255, 255, 0.52);
        background: linear-gradient(135deg, #ff5f57 0%, #ff9f1c 18%, #ffd166 34%, #2ec4b6 50%, #3a86ff 68%, #6c63ff 84%, #f15bb5 100%);
        box-shadow: none;
        color: rgba(255, 255, 255, 0.98);
        text-shadow: 0 1px 1px rgba(15, 23, 42, 0.3);
      }

      .dgbt-color-row {
        display: grid;
        grid-template-columns: 44px minmax(0, 1fr);
        gap: 8px;
      }

      .dgbt-color-input,
      .dgbt-text-input {
        border: 1px solid var(--dgbt-panel-border);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.88);
      }

      .dgbt-color-input {
        width: 44px;
        height: 44px;
        padding: 4px;
      }

      .dgbt-text-input {
        height: 44px;
        padding: 0 12px;
        font-size: 13px;
      }

      .dgbt-choice-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 6px;
      }

      .dgbt-choice-row {
        display: grid;
        gap: 6px;
      }

      .dgbt-choice-row-width {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .dgbt-choice-row-motion {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .dgbt-choice-row-shape {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .dgbt-choice-pill {
        position: relative;
        display: block;
      }

      .dgbt-choice-pill input {
        position: absolute;
        inset: 0;
        opacity: 0;
      }

      .dgbt-choice-pill span,
      .dgbt-choice-button {
        display: inline-flex;
        justify-content: center;
        align-items: center;
        width: 100%;
        min-height: 34px;
        border: 1px solid rgba(148, 163, 184, 0.28);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.78);
        color: var(--dgbt-panel-text);
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        box-sizing: border-box;
        transition: border-color 140ms ease, background-color 140ms ease, transform 140ms ease;
      }

      .dgbt-choice-pill input:checked + span,
      .dgbt-choice-button.is-active {
        border-color: rgba(31, 122, 224, 0.32);
        background: rgba(31, 122, 224, 0.12);
        color: var(--dgbt-panel-accent);
      }

      @keyframes dgbt-panel-line-drift {
        from {
          background-position: 0 0;
          opacity: 0.9;
        }

        50% {
          opacity: 1;
        }

        to {
          background-position: 48px 0;
          opacity: 0.9;
        }
      }

      @keyframes dgbt-panel-dot-drift {
        0%, 100% {
          transform: translateY(-50%);
          box-shadow: 0 0 0 5px color-mix(in srgb, var(--dgbt-panel-accent) 12%, transparent);
          opacity: 0.94;
        }

        50% {
          transform: translateY(-50%);
          box-shadow: 0 0 0 9px color-mix(in srgb, var(--dgbt-panel-accent) 0%, transparent);
          opacity: 1;
        }
      }

      @media (max-width: 760px) {
        .dgbt-panel-shell {
          padding: 12px;
        }

        .dgbt-panel-window {
          width: min(100vw - 24px, 700px);
          max-height: calc(100vh - 24px);
        }

        .dgbt-panel-header {
          flex-direction: column;
          padding: 16px;
        }

        .dgbt-panel-main {
          padding: 12px;
        }

        .dgbt-choice-grid,
        .dgbt-choice-row,
        .dgbt-color-row {
          grid-template-columns: 1fr;
        }

        .dgbt-accent-swatch-grid,
        .dgbt-accent-swatch-grid-wide {
          display: flex;
          flex-wrap: nowrap;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script src="./lsplugin.user.js?v=0.1.1"></script>
    <script src="./plugin.js?v=0.1.1"></script>
  </body>
</html>
