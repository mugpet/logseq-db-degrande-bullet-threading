<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Degrande Bullet Threading v0.3.6</title>
    <meta name="degrande-bullet-threading-version" content="0.3.6">
    <style>
      :root {
        --dgbt-panel-bg: rgba(245, 248, 255, 0.9);
        --dgbt-panel-bg-strong: rgba(255, 255, 255, 0.82);
        --dgbt-panel-border: rgba(148, 163, 184, 0.2);
        --dgbt-panel-text: #132033;
        --dgbt-panel-muted: #5d6c82;
        --dgbt-panel-accent: #1f7ae0;
        --dgbt-panel-preview-accent: #1f7ae0;
        --dgbt-panel-shadow: 0 24px 56px rgba(15, 23, 42, 0.14);
        --dgbt-panel-thread-width: 2px;
        --dgbt-panel-motion-duration: 700ms;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        font-family: Aptos, "Segoe UI Variable Text", "Segoe UI", sans-serif;
        background: transparent;
        color: var(--dgbt-panel-text);
      }

      body {
        overflow: hidden;
      }

      #app {
        min-height: 100vh;
      }

      .dgbt-panel-shell {
        position: relative;
        width: 100vw;
        height: 100vh;
        display: grid;
        place-items: center;
        padding: 10px;
        box-sizing: border-box;
      }

      .dgbt-panel-backdrop {
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at top right, rgba(31, 122, 224, 0.1), transparent 26%),
          linear-gradient(180deg, rgba(15, 23, 42, 0.12), rgba(15, 23, 42, 0.05));
      }

      .dgbt-panel-window {
        position: relative;
        z-index: 1;
        width: min(560px, calc(100vw - 24px));
        max-height: calc(100vh - 24px);
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        overflow: hidden;
        border: 1px solid var(--dgbt-panel-border);
        border-radius: 22px;
        background:
          radial-gradient(circle at top left, rgba(31, 122, 224, 0.08), transparent 24%),
          var(--dgbt-panel-bg);
        box-shadow: var(--dgbt-panel-shadow);
        -webkit-backdrop-filter: blur(16px) saturate(126%);
        backdrop-filter: blur(16px) saturate(126%);
      }

      .dgbt-panel-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 14px;
        padding: 16px 18px 12px;
        border-bottom: 1px solid var(--dgbt-panel-border);
      }

      .dgbt-panel-title-row {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .dgbt-panel-eyebrow,
      .dgbt-panel-card-eyebrow,
      .dgbt-accent-palette-label {
        margin: 0;
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: var(--dgbt-panel-accent);
      }

      .dgbt-panel-header h1 {
        margin: 0;
        font-size: clamp(24px, 3.8vw, 34px);
        line-height: 0.98;
        letter-spacing: -0.045em;
      }

      .dgbt-panel-version,
      .dgbt-panel-pill {
        display: inline-flex;
        align-items: center;
        min-height: 22px;
        padding: 0 8px;
        border-radius: 999px;
        font-size: 10px;
        font-weight: 700;
      }

      .dgbt-panel-version {
        background: rgba(31, 122, 224, 0.12);
        color: var(--dgbt-panel-accent);
      }

      .dgbt-panel-subtitle {
        margin: 6px 0 0;
        max-width: 420px;
        font-size: 12px;
        line-height: 1.4;
        color: var(--dgbt-panel-muted);
      }

      .dgbt-panel-button,
      .dgbt-choice-button,
      .dgbt-choice-pill span,
      .dgbt-text-input,
      .dgbt-color-input {
        font: inherit;
      }

      .dgbt-panel-button {
        appearance: none;
        border: 1px solid var(--dgbt-panel-border);
        border-radius: 999px;
        min-height: 32px;
        padding: 0 12px;
        background: rgba(255, 255, 255, 0.72);
        color: var(--dgbt-panel-text);
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
        transition: background-color 140ms ease, border-color 140ms ease, transform 140ms ease;
      }

      .dgbt-panel-button:hover {
        transform: translateY(-1px);
        background: rgba(255, 255, 255, 0.92);
      }

      .dgbt-panel-main {
        padding: 12px;
        min-height: 0;
        overflow: auto;
      }

      .dgbt-panel-controls-column {
        display: grid;
        min-height: 0;
      }

      .dgbt-panel-card {
        border: 1px solid var(--dgbt-panel-border);
        border-radius: 16px;
        background: var(--dgbt-panel-bg-strong);
        box-shadow: 0 10px 24px rgba(15, 23, 42, 0.05);
        padding: 14px;
      }

      .dgbt-switch-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        align-items: center;
        gap: 10px;
        padding: 0 0 8px;
      }

      .dgbt-switch-row-compact {
        padding: 12px 14px;
        margin-bottom: 10px;
        border: 1px solid rgba(148, 163, 184, 0.16);
        border-radius: 14px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.74), rgba(248, 250, 255, 0.94));
      }

      .dgbt-switch-row strong {
        display: block;
        font-size: 13.5px;
      }

      .dgbt-switch-row p,
      .dgbt-control-help {
        margin: 3px 0 0;
        font-size: 11.5px;
        line-height: 1.35;
        color: var(--dgbt-panel-muted);
      }

      .dgbt-switch-row input[type="checkbox"] {
        width: 20px;
        height: 20px;
        accent-color: var(--dgbt-panel-accent);
      }

      .dgbt-control-group {
        display: grid;
        gap: 8px;
        padding-top: 10px;
        margin-top: 10px;
        border-top: 1px solid rgba(148, 163, 184, 0.18);
      }

      .dgbt-control-group-tight {
        border-top: 0;
        padding-top: 0;
        margin-top: 0;
      }

      .dgbt-control-head {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 12px;
      }

      .dgbt-control-head strong {
        font-size: 13px;
      }

      .dgbt-control-head span {
        font-size: 10.5px;
        color: var(--dgbt-panel-muted);
      }

      .dgbt-control-head-accent {
        justify-content: flex-end;
      }

      .dgbt-accent-palette-group {
        display: grid;
        gap: 6px;
      }

      .dgbt-accent-palette-label {
        color: var(--dgbt-panel-muted);
      }

      .dgbt-accent-swatch-grid {
        display: flex;
        flex-wrap: nowrap;
        gap: 4px;
        overflow-x: auto;
        overflow-y: hidden;
        padding-bottom: 2px;
      }

      .dgbt-accent-swatch-grid-wide {
        display: flex;
        flex-wrap: nowrap;
      }

      .dgbt-accent-swatch-grid::-webkit-scrollbar {
        display: none;
      }

      .dgbt-accent-swatch-button {
        appearance: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 18px;
        height: 18px;
        padding: 0;
        border: 1px solid rgba(148, 163, 184, 0.28);
        border-radius: 6px;
        background: color-mix(in srgb, var(--dgbt-swatch-color) 14%, white 86%);
        box-shadow: inset 0 0 0 1.5px var(--dgbt-swatch-color);
        color: #172033;
        font-size: 9px;
        font-weight: 800;
        cursor: pointer;
        transition: transform 140ms ease, box-shadow 140ms ease, border-color 140ms ease;
      }

      .dgbt-accent-swatch-button:hover {
        transform: translateY(-1px);
      }

      .dgbt-accent-swatch-button.is-active {
        border-color: var(--dgbt-swatch-color);
        box-shadow:
          inset 0 0 0 1.5px var(--dgbt-swatch-color),
          0 0 0 3px rgba(15, 23, 42, 0.08);
      }

      .dgbt-accent-swatch-button.is-special {
        font-size: 11px;
      }

      .dgbt-accent-swatch-button.is-rainbow {
        border-color: rgba(255, 255, 255, 0.52);
        background: linear-gradient(135deg, #ff5f57 0%, #ff9f1c 18%, #ffd166 34%, #2ec4b6 50%, #3a86ff 68%, #6c63ff 84%, #f15bb5 100%);
        box-shadow: none;
        color: rgba(255, 255, 255, 0.98);
        text-shadow: 0 1px 1px rgba(15, 23, 42, 0.3);
      }

      .dgbt-color-row {
        display: grid;
        grid-template-columns: 38px minmax(0, 1fr);
        gap: 6px;
      }

      .dgbt-color-input,
      .dgbt-text-input {
        border: 1px solid var(--dgbt-panel-border);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.88);
      }

      .dgbt-color-input {
        width: 38px;
        height: 38px;
        padding: 3px;
      }

      .dgbt-text-input {
        height: 38px;
        padding: 0 10px;
        font-size: 12px;
      }

      .dgbt-choice-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 6px;
      }

      .dgbt-choice-row {
        display: grid;
        gap: 5px;
      }

      .dgbt-choice-row-width {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .dgbt-choice-row-motion {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .dgbt-choice-row-shape {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .dgbt-choice-row-shape.dgbt-choice-row-shape-3 {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .dgbt-choice-row-end {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .dgbt-choice-pill {
        position: relative;
        display: block;
      }

      .dgbt-choice-pill input {
        position: absolute;
        inset: 0;
        opacity: 0;
      }

      .dgbt-choice-pill span,
      .dgbt-choice-button {
        display: inline-flex;
        justify-content: center;
        align-items: center;
        width: 100%;
        min-height: 34px;
        border: 1px solid rgba(148, 163, 184, 0.28);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.7);
        color: var(--dgbt-panel-text);
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
        box-sizing: border-box;
        transition: border-color 140ms ease, background-color 140ms ease, transform 140ms ease;
      }

      .dgbt-choice-row-end .dgbt-choice-button {
        min-height: 34px;
        font-size: 12px;
        border-radius: 9px;
        padding: 0 4px;
      }

      .dgbt-choice-pill span:hover,
      .dgbt-choice-button:hover {
        transform: translateY(-1px);
        background: rgba(255, 255, 255, 0.92);
      }

      .dgbt-choice-pill input:checked + span,
      .dgbt-choice-button.is-active {
        border-color: rgba(31, 122, 224, 0.32);
        background: linear-gradient(180deg, rgba(31, 122, 224, 0.14), rgba(31, 122, 224, 0.1));
        color: var(--dgbt-panel-accent);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.5);
      }

      @media (max-width: 760px) {
        .dgbt-panel-shell {
          padding: 8px;
        }

        .dgbt-panel-window {
          width: min(100vw - 16px, 560px);
          max-height: calc(100vh - 16px);
        }

        .dgbt-panel-header {
          flex-direction: column;
          padding: 14px;
        }

        .dgbt-panel-main {
          padding: 10px;
        }

        .dgbt-choice-grid,
        .dgbt-color-row {
          grid-template-columns: 1fr;
        }

        .dgbt-choice-row-motion,
        .dgbt-choice-row-shape,
        .dgbt-choice-row-end {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .dgbt-accent-swatch-grid,
        .dgbt-accent-swatch-grid-wide {
          display: flex;
          flex-wrap: nowrap;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script src="./lsplugin.user.js?v=0.3.6"></script>
    <script src="./plugin.js?v=0.3.6"></script>
  </body>
</html>
